# Reload config file
bind r source-file ~/.config/tmux/tmux.conf\; display-message "tmux configuration reloaded"


# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes using | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# Switch panes using Alt-{hjkl} without prefix
bind -n M-l select-pane -L
bind -n M-h select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Move panes using '<' and '>'
bind -r H resize-pane -L "5"
bind -r J resize-pane -D "5"
bind -r K resize-pane -U "5"
bind -r L resize-pane -R "5"

#bind -n M-, select-window -p
#bind -n M-. select-window -n

bind -n 'M-[' select-window -p
bind -n 'M-]' select-window -n

# Disable annoying Esc binding for switching panes
set -s escape-time 20

# Enable mouse control (clickable windows, panes, resizable panes
set -g mouse-select-window on
set -g mouse-select-pane on
set -g mouse-resize-pane on
set -g mouse on


set -g default-terminal "tmux-256color"
# Truecolor (RGB) support
set -as terminal-overrides ',*:Tc'
# Undercurl support
# https://github.com/tmux/tmux/issues/1492#issuecomment-427939241
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Underscore colors
# https://github.com/tmux/tmux/pull/1771#issuecomment-500906522
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g base-index 1          # Start with Window 1
set -g pane-base-index 1     # Start with Pane 1
set -g renumber-windows on   # Renumber windows after closing
set -g automatic-rename on   # Rename the window to the current process
set -g mode-keys vi          # Use Vi keys in copy mode

bind -n M-v copy-mode
bind -n M-Tab copy-mode

# Status line customizations

sepfg="colour5"
reset="default"

neutralbg="color236"
neutralfg="color252"
nfg=$neutralfg
nbg=$neutralbg

neutral_open="#[fg=$nbg]#[fg=$nfg]#[bg=$nbg]"
neutral_close="#[bg=$reset]#[fg=$nbg]"

activebg="color4"
activefg="color16"
afg=$activefg
abg=$activebg

active_open="#[fg=$abg]#[fg=$afg]#[bg=$abg]"
active_close="#[bg=$reset]#[fg=$abg]"

statusbg="color14"
statusfg="color254"
sfg=$statusfg
sbg=$statusbg

status_pre="#[fg=$sfg]#[bg=$reset]"
status_open="#[fg=$sbg]#[fg=$afg]#[bg=$sbg]"
status_close="#[bg=$reset]#[fg=$sbg]"

winnamebg="color5"
winnamefg="color16"
wbg=$winnamebg
wfg=$winnamefg


clock="$status_pre""
  ""   ""
  ""$status_open""
  ""#(date +'%H:%M')""
  ""$status_close"

date="$status_pre""
  ""   ""
  ""$status_open""
  ""#(date +'%d󰿟%m󰿟%Y')""
  ""$status_close"

winname="#[fg=$wbg] #[fg=$wbg]#[fg=$wfg]""
  ""#[bg=$wbg] #S #[bg=$reset]#[fg=$wbg] "

win="$neutral_open""
  "" #W ""
  ""$neutral_close"

win_active="$active_open""
  "" #W ""
  ""$active_close"

set -g status-justify left
set -g status-style 'fg=colour0'
set -g status-interval 2
set -g status-right-length 100
set -g status-right '#(~/.config/tmux/status)'
set -g status-right $clock" "$date" "$winname
set -g status-left '' # info on left (no session display)

set -g message-style "fg=colour7"
set -g message-command-style "fg=colour3"
set -g mode-style "bg=colour4,fg=colour0"
set -g pane-border-style "fg=colour0"
set -g pane-active-border-style "fg=colour8"
set -g display-panes-active-colour "colour3"
set -g status-position bottom

set -g window-status-format "#[fg=colour0]░▓█#[bg=colour0,fg=colour4]#W "
set -g window-status-current-format "#[fg=colour6]░▓█#[bg=colour4,fg=colour0]#W "

set -g window-status-separator " "
set -g status-style "bg=default,fg=colour0"
set -g window-status-format $win
set -g window-status-current-format $win_active
